repos:
  # Prettier - Code formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css]
        exclude: ^(package-lock\.json|dist/)

  # ESLint - Linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.(ts|tsx)$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/parser@6.15.0'
          - '@typescript-eslint/eslint-plugin@6.15.0'
          - eslint-plugin-react-hooks@4.6.0
          - eslint-plugin-react-refresh@0.4.5
          - typescript@5.3.3

  # Security - Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  # Local hooks - FAST tests only (MANDATORY - runs first)
  - repo: local
    hooks:
      - id: vitest-fast
        name: vitest tests (fast only)
        entry: bash -c 'npm run test:fast || exit 1'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        stages: [commit]

      # Type checking
      - id: tsc
        name: typescript type check
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        stages: [commit]

      # Build validation (ensure project builds)
      - id: npm-build
        name: build check
        entry: npm run build
        language: system
        pass_filenames: false
        files: \.(ts|tsx|json|css)$
        stages: [push]

# Global settings
default_language_version:
  node: system

# Fail fast on first error
fail_fast: false
